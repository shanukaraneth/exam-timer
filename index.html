<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>iMATE Secure Login</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --imate-blue:#23578e;
    --imate-cyan:#4bb8d8;
    --imate-gold:#f0b000;
    --dark:#0f172a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Outfit',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        var(--imate-blue),
        var(--imate-cyan)
    );
    overflow:hidden;
    position:relative;
}

/* Decorative Background */

.bg-circle{
    position:absolute;
    border-radius:50%;
    opacity:0.15;
}

.circle1{
    width:400px;
    height:400px;
    background:var(--imate-gold);
    top:-150px;
    left:-150px;
}

.circle2{
    width:500px;
    height:500px;
    background:white;
    bottom:-200px;
    right:-200px;
}

/* Login Card */

.login-card{
    width:420px;
    max-width:90%;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:28px;
    padding:40px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    z-index:2;
}

.logo{
    width:260px;
    max-width:100%;
    margin-bottom:15px;
}

.tagline{
    color:white;
    font-size:0.95rem;
    margin-bottom:25px;
    opacity:0.9;
}

input{
    width:100%;
    padding:14px 16px;
    border:none;
    border-radius:12px;
    margin-bottom:15px;
    font-size:1rem;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--imate-gold);
    color:black;
    font-weight:600;
    font-size:1rem;
    cursor:pointer;
    transition:0.25s;
}

button:hover{
    transform:translateY(-2px);
}

#error{
    margin-top:15px;
    color:#ffd7d7;
    display:none;
}

.footer{
    margin-top:25px;
    color:white;
    opacity:0.75;
    font-size:0.85rem;
}

</style>
</head>
<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<div class="login-card">

    <img src="logo.png" alt="iMATE Logo" class="logo">

    <div class="tagline">
        Secure Access Portal
    </div>

    <form id="loginForm">

        <input
            type="text"
            id="username"
            placeholder="Username"
            autocomplete="off"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

        <div id="error">
            Invalid username or password.
        </div>

    </form>

    <div class="footer">
        Learning Today, Leading Tomorrow
    </div>

</div>

<script src="credentials.js"></script>

<script>

/* ===================================
   CHANGE REDIRECT PAGE HERE
   =================================== */

const REDIRECT_URL = "iMATE_Timer.html";

/* =================================== */

document.getElementById("loginForm").addEventListener("submit", function(e){

    e.preventDefault();

    const enteredUsername =
        document.getElementById("username").value.trim();

    const enteredPassword =
        document.getElementById("password").value;

    if(
        enteredUsername === USERNAME &&
        enteredPassword === PASSWORD
    ){
        sessionStorage.setItem("imateLoggedIn", "true");
        window.location.href = REDIRECT_URL;
    }
    else{
        document.getElementById("error").style.display = "block";
    }

});

/* Enter key support */
document.addEventListener("keydown", function(event){
    if(event.key === "Enter"){
        document.querySelector("button").click();
    }
});

</script>

</body>
</html>
