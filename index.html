<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMATE College Exam Timer</title>
    
    <!-- Google Fonts: Outfit (UI) and Roboto Mono (Timer Tabular Nums) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'imate-yellow': '#f5a918',
                        'imate-darkblue': '#275c88',
                        'imate-lightblue': '#48b2cc'
                    },
                    fontFamily: {
                        'sans': ['Outfit', 'sans-serif'],
                        'mono': ['Roboto Mono', 'monospace']
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS for Animations & Refinements -->
    <style>
        body { background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        
        /* Floating Background Shapes */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.12;
            filter: blur(50px);
            z-index: -1;
            animation: float 25s infinite ease-in-out alternate;
        }
        .shape-1 { background-color: #f5a918; width: 400px; height: 400px; top: -10%; left: -5%; }
        .shape-2 { background-color: #48b2cc; width: 500px; height: 500px; bottom: -15%; right: -10%; animation-delay: -5s; }
        .shape-3 { background-color: #275c88; width: 350px; height: 350px; top: 40%; left: 30%; animation-delay: -12s; }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -40px) scale(1.05); }
            100% { transform: translate(-20px, 30px) scale(0.95); }
        }

        /* 5-Minute Warning Animations */
        @keyframes pulse-red {
            0%, 100% { color: #dc2626; transform: scale(1); }
            50% { color: #991b1b; transform: scale(1.03); }
        }
        .warning-pulse {
            animation: pulse-red 2s infinite ease-in-out;
            color: #dc2626 !important;
        }
        .warning-bg { background: #dc2626 !important; }

        /* Custom Scrollbar for Exams List */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Modals & Overlays */
        .modal-overlay { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        
        /* Tabular Timer */
        .tabular-timer { font-variant-numeric: tabular-nums; letter-spacing: -2px; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col relative selection:bg-imate-lightblue selection:text-white">

    <!-- Global App Container -->
    <div id="app" class="flex-grow flex flex-col w-full h-full relative"></div>

    <script>
        /** ==========================================
         * GLOBAL CONFIGURATION & STATE
         * ========================================== */
        // Exact directory requested
        const LOGO_DIRECTORY = "logo.png";
        
        // App State
        let state = {
            view: 'home', // 'home', 'timer', 'end'
            exams: JSON.parse(localStorage.getItem('iMATE_Exams') || '[]'),
            activeExam: null, // Holds details for running timer
            timerInterval: null,
            globalClockInterval: null
        };

        /** ==========================================
         * CORE UTILITIES
         * ========================================== */
        // Format time (HH:MM:SS)
        function formatTime(totalSeconds) {
            const h = Math.floor(Math.max(totalSeconds, 0) / 3600);
            const m = Math.floor((Math.max(totalSeconds, 0) % 3600) / 60);
            const s = Math.floor(Math.max(totalSeconds, 0) % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // Format to AM/PM Time
        function formatTimeAMPM(date) {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // Save exams to localStorage
        function saveExams() {
            localStorage.setItem('iMATE_Exams', JSON.stringify(state.exams));
        }

        // Beautiful Text Fallback if Local Logo Cannot Load (Browser Security constraints)
        function generateLogoHTML() {
            return `
                <img src="${LOGO_DIRECTORY}" alt="iMATE Logo" class="h-10 object-contain hidden" onload="this.classList.remove('hidden'); this.nextElementSibling.classList.add('hidden');" onerror="this.nextElementSibling.classList.remove('hidden');" />
                <div class="text-3xl font-bold tracking-tight text-imate-darkblue flex items-center logo-fallback">
                    i<span class="text-imate-yellow">MATE</span><span class="text-sm font-normal ml-2 text-imate-lightblue uppercase tracking-widest mt-1 hidden sm:block">College</span>
                </div>
            `;
        }

        /** ==========================================
         * VIEW RENDERING
         * ========================================== */
        const appContainer = document.getElementById('app');

        function render() {
            // Manage Background shapes
            const hasShapes = document.getElementById('bg-shapes');
            if (state.view === 'home') {
                if (!hasShapes) {
                    const shapesHTML = `
                        <div id="bg-shapes">
                            <div class="bg-shape shape-1"></div>
                            <div class="bg-shape shape-2"></div>
                            <div class="bg-shape shape-3"></div>
                        </div>
                    `;
                    appContainer.insertAdjacentHTML('beforebegin', shapesHTML);
                }
            } else {
                if (hasShapes) hasShapes.remove(); // Distraction-free mode
            }

            // Route to correct view
            if (state.view === 'home') renderHome();
            else if (state.view === 'timer') renderTimer();
            else if (state.view === 'end') renderEnd();

            updateGlobalClock();
        }

        /** ==========================================
         * VIEW 1: HOME / DASHBOARD
         * ========================================== */
        function renderHome() {
            // Sort exams by date ascending
            const sortedExams = [...state.exams].sort((a, b) => new Date(a.date) - new Date(b.date));
            
            const examCards = sortedExams.length === 0 
                ? `<div class="text-gray-500 text-center py-10 bg-white/50 rounded-xl border border-dashed border-gray-300">No upcoming exams scheduled.<br>Add one using the form.</div>`
                : sortedExams.map((exam, index) => {
                    const examDate = new Date(exam.date);
                    const formattedDate = examDate.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
                    const formattedTime = examDate.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
                    return `
                    <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 hover:shadow-md transition-shadow flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h3 class="text-lg font-semibold text-imate-darkblue">${exam.name}</h3>
                            <div class="text-sm text-gray-500 flex items-center gap-3 mt-1">
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    ${formattedDate} @ ${formattedTime}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    ${exam.duration} Minutes
                                </span>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 w-full sm:w-auto">
                            <button onclick="deleteExam('${exam.id}')" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors" title="Delete Exam">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                            <button onclick="launchExam('${exam.id}')" class="flex-1 sm:flex-none bg-imate-lightblue hover:bg-opacity-90 text-white px-5 py-2 rounded-lg font-medium transition-colors shadow-sm flex justify-center items-center gap-2">
                                Launch Timer
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        </div>
                    </div>
                `}).join('');

            appContainer.innerHTML = `
                <!-- Header -->
                <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
                    ${generateLogoHTML()}
                    <div class="flex items-center gap-2 text-imate-darkblue font-semibold text-xl tracking-wide">
                        <svg class="w-6 h-6 text-imate-yellow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span id="global-clock" class="font-mono">--:--:--</span>
                    </div>
                </header>

                <!-- Main Content -->
                <main class="flex-grow p-8 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-8 relative z-0">
                    
                    <!-- Left: Add Exam Form -->
                    <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-gray-200 p-6 h-fit">
                        <h2 class="text-xl font-bold text-imate-darkblue mb-6 flex items-center gap-2">
                            <span class="bg-imate-yellow text-white p-1 rounded">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                            </span>
                            Schedule New Exam
                        </h2>
                        <form id="add-exam-form" onsubmit="handleAddExam(event)" class="space-y-5">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Exam / Module Name</label>
                                <input type="text" id="exam-name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-imate-lightblue focus:border-imate-lightblue outline-none transition-all placeholder-gray-400" placeholder="e.g. Final Computer Science">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Date & Time</label>
                                <input type="datetime-local" id="exam-date" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-imate-lightblue focus:border-imate-lightblue outline-none transition-all text-gray-700">
                            </div>
                            
                            <div class="pt-2 border-t border-gray-100">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Exam Duration</label>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <div class="relative">
                                            <input type="number" id="exam-hours" min="0" required class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-imate-lightblue outline-none transition-all" value="2">
                                            <span class="absolute right-3 top-2.5 text-gray-400 text-sm pointer-events-none">hrs</span>
                                        </div>
                                    </div>
                                    <div>
                                        <div class="relative">
                                            <input type="number" id="exam-minutes" min="0" max="59" required class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-imate-lightblue outline-none transition-all" value="0">
                                            <span class="absolute right-3 top-2.5 text-gray-400 text-sm pointer-events-none">min</span>
                                        </div>
                                    </div>
                                </div>
                                <div id="duration-preview" class="text-xs text-imate-lightblue mt-2 font-medium">Total: 120 Minutes</div>
                            </div>

                            <button type="submit" class="w-full bg-imate-darkblue hover:bg-opacity-90 text-white py-3 rounded-lg font-semibold transition-colors mt-4 shadow-md">
                                Save Exam Schedule
                            </button>
                        </form>
                    </div>

                    <!-- Right: Upcoming Exams List -->
                    <div class="lg:col-span-2 flex flex-col h-full">
                        <div class="flex justify-between items-end mb-4">
                            <h2 class="text-xl font-bold text-gray-800">Upcoming Schedule</h2>
                            <span class="text-sm font-medium bg-gray-100 text-gray-600 px-3 py-1 rounded-full">${state.exams.length} Total</span>
                        </div>
                        <div class="space-y-3 overflow-y-auto pr-2 pb-10" style="max-height: calc(100vh - 200px);">
                            ${examCards}
                        </div>
                    </div>
                </main>
            `;

            // Live duration preview binding
            setTimeout(() => {
                const hrsInput = document.getElementById('exam-hours');
                const minInput = document.getElementById('exam-minutes');
                const preview = document.getElementById('duration-preview');
                const updatePreview = () => {
                    const h = parseInt(hrsInput.value) || 0;
                    const m = parseInt(minInput.value) || 0;
                    preview.textContent = `Total: ${(h * 60) + m} Minutes`;
                };
                if(hrsInput && minInput) {
                    hrsInput.addEventListener('input', updatePreview);
                    minInput.addEventListener('input', updatePreview);
                }
            }, 0);
        }

        /** ==========================================
         * VIEW 2: ACTIVE TIMER (PROJECTOR VIEW)
         * ========================================== */
        function renderTimer() {
            const ex = state.activeExam;
            const progress = ex.isRunning && ex.totalTimeSeconds > 0
                ? Math.min(100, Math.max(0, ((ex.totalTimeSeconds - ex.timeLeftSeconds) / ex.totalTimeSeconds) * 100))
                : 0;

            const isWarning = ex.timeLeftSeconds <= 300 && ex.isRunning; // 5 mins

            appContainer.innerHTML = `
                <!-- Minimal Header -->
                <header class="px-6 py-4 flex justify-between items-center bg-white border-b border-gray-100">
                    <button onclick="handleBackToMenu()" class="text-gray-500 hover:text-imate-darkblue flex items-center gap-2 font-medium transition-colors" ${ex.isRunning ? 'title="Exam in progress. Requires confirmation to leave."' : ''}>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Back to Menu
                    </button>
                    ${generateLogoHTML()}
                    <div class="text-gray-600 font-mono text-xl" id="global-clock-timer">--:--:--</div>
                </header>

                <!-- Central Display -->
                <main class="flex-grow flex flex-col items-center justify-center p-8 bg-white text-center select-none relative">
                    
                    <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold text-imate-darkblue uppercase tracking-tight mb-2 max-w-5xl leading-tight">
                        ${ex.name}
                    </h1>
                    
                    <!-- Info Badges -->
                    <div class="flex gap-4 mt-4 mb-8 opacity-90">
                        <div class="bg-gray-100 text-gray-700 px-4 py-1.5 rounded-full font-medium text-lg border border-gray-200">
                            Total Duration: ${Math.floor(ex.totalTimeSeconds / 3600)}h ${Math.floor((ex.totalTimeSeconds % 3600) / 60)}m
                        </div>
                        <div id="ends-at-badge" class="bg-imate-yellow/10 text-imate-darkblue px-4 py-1.5 rounded-full font-medium text-lg border border-imate-yellow/30 ${!ex.isRunning ? 'hidden' : ''}">
                            Ends At: <span id="ends-at-time">${ex.endsAt ? formatTimeAMPM(new Date(ex.endsAt)) : '--:--'}</span>
                        </div>
                    </div>

                    <!-- THE TIMER -->
                    <div id="countdown-display" class="tabular-timer font-mono text-[12vw] leading-none font-bold text-gray-800 my-4 transition-colors duration-500 ${isWarning ? 'warning-pulse' : ''}">
                        ${formatTime(ex.timeLeftSeconds)}
                    </div>

                    <!-- Progress Bar Container -->
                    <div class="w-full max-w-4xl mt-10">
                        <div class="h-8 md:h-10 w-full bg-gray-100 rounded-full overflow-hidden border border-gray-200 shadow-inner relative">
                            <div id="progress-bar-fill" 
                                 class="h-full rounded-full transition-all duration-1000 ease-linear ${isWarning ? 'warning-bg' : 'bg-gradient-to-r from-imate-lightblue to-imate-darkblue'}"
                                 style="width: ${progress}%">
                            </div>
                        </div>
                        <div class="mt-3 text-xl font-bold text-gray-500 text-right w-full flex justify-between px-2">
                            <span>Started: ${ex.startTime ? formatTimeAMPM(new Date(ex.startTime)) : 'Pending'}</span>
                            <span id="progress-text">${Math.floor(progress)}% Completed</span>
                        </div>
                    </div>
                </main>

                <!-- Examiner Controls Action Bar -->
                <footer class="bg-gray-50 border-t border-gray-200 p-4 flex justify-center items-center gap-4">
                    ${!ex.isRunning ? `
                        <button onclick="startTimer()" class="bg-imate-yellow hover:bg-yellow-500 text-gray-900 text-xl font-bold py-4 px-12 rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1">
                            BEGIN EXAM NOW
                        </button>
                    ` : `
                        <button onclick="openAddTimeModal()" class="bg-white border-2 border-imate-lightblue text-imate-darkblue hover:bg-blue-50 text-lg font-semibold py-3 px-8 rounded-xl transition-colors flex items-center gap-2 shadow-sm">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Add Extra Time
                        </button>
                        <button onclick="promptEndEarly()" class="bg-white border-2 border-red-500 text-red-600 hover:bg-red-50 text-lg font-semibold py-3 px-8 rounded-xl transition-colors shadow-sm">
                            End Exam Early
                        </button>
                    `}
                </footer>
            `;
        }

        /** ==========================================
         * VIEW 3: END SCREEN
         * ========================================== */
        function renderEnd() {
            const ex = state.activeExam;
            const actStart = ex.startTime ? formatTimeAMPM(new Date(ex.startTime)) : 'N/A';
            const actEnd = ex.actualEndTime ? formatTimeAMPM(new Date(ex.actualEndTime)) : formatTimeAMPM(new Date());

            appContainer.innerHTML = `
                <div class="absolute inset-0 flex items-center justify-center modal-overlay p-4 z-50">
                    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-2xl w-full text-center border border-gray-100 flex flex-col">
                        
                        <!-- Accent Strip -->
                        <div class="h-3 w-full bg-gradient-to-r from-imate-yellow via-imate-lightblue to-imate-darkblue"></div>
                        
                        <div class="p-10 flex flex-col items-center">
                            ${generateLogoHTML()}
                            
                            <h1 class="text-5xl font-black text-gray-900 mt-8 mb-4 tracking-tight">EXAM CONCLUDED</h1>
                            <p class="text-2xl text-red-600 font-bold mb-10 max-w-lg leading-snug">
                                Please put your pens down immediately and close your papers.
                            </p>

                            <!-- Summary Data Box -->
                            <div class="w-full bg-gray-50 rounded-2xl p-6 border border-gray-200 mb-10 text-left">
                                <h3 class="text-sm uppercase tracking-wider text-gray-500 font-bold mb-4 border-b border-gray-200 pb-2">Session Summary</h3>
                                <div class="grid grid-cols-2 gap-y-4 gap-x-8">
                                    <div>
                                        <p class="text-sm text-gray-500">Module / Subject</p>
                                        <p class="text-lg font-bold text-imate-darkblue truncate" title="${ex.name}">${ex.name}</p>
                                    </div>
                                    <div>
                                        <p class="text-sm text-gray-500">Total Allotted Duration</p>
                                        <p class="text-lg font-bold text-gray-800">${Math.floor(ex.totalTimeSeconds / 3600)}h ${Math.floor((ex.totalTimeSeconds % 3600) / 60)}m</p>
                                    </div>
                                    <div>
                                        <p class="text-sm text-gray-500">Started At</p>
                                        <p class="text-lg font-bold text-gray-800">${actStart}</p>
                                    </div>
                                    <div>
                                        <p class="text-sm text-gray-500">Ended At</p>
                                        <p class="text-lg font-bold text-gray-800">${actEnd}</p>
                                    </div>
                                </div>
                            </div>

                            <button onclick="resetToDashboard()" class="bg-imate-darkblue hover:bg-opacity-90 text-white text-lg font-semibold py-4 px-10 rounded-xl transition-colors shadow-md w-full sm:w-auto">
                                Return to Dashboard
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        /** ==========================================
         * ACTIONS & LOGIC
         * ========================================== */
        
        // Add Exam from Form
        function handleAddExam(e) {
            e.preventDefault();
            const name = document.getElementById('exam-name').value.trim();
            const date = document.getElementById('exam-date').value;
            const hours = parseInt(document.getElementById('exam-hours').value) || 0;
            const minutes = parseInt(document.getElementById('exam-minutes').value) || 0;

            const totalMinutes = (hours * 60) + minutes;
            if (totalMinutes <= 0) {
                alert("Please enter a valid duration greater than 0 minutes.");
                return;
            }

            const newExam = {
                id: 'exam_' + Date.now().toString(),
                name,
                date,
                duration: totalMinutes
            };

            state.exams.push(newExam);
            saveExams();
            render(); // re-render home
        }

        // Delete Exam
        function deleteExam(id) {
            if (confirm("Are you sure you want to delete this exam schedule?")) {
                state.exams = state.exams.filter(ex => ex.id !== id);
                saveExams();
                render();
            }
        }

        // Setup Timer View
        function launchExam(id) {
            const exam = state.exams.find(ex => ex.id === id);
            if (!exam) return;

            const totalSeconds = exam.duration * 60;
            
            state.activeExam = {
                ...exam,
                totalTimeSeconds: totalSeconds,
                timeLeftSeconds: totalSeconds,
                isRunning: false,
                startTime: null,
                endsAt: null,
                actualEndTime: null
            };

            state.view = 'timer';
            render();
        }

        // Start the actual countdown
        function startTimer() {
            if (!state.activeExam) return;
            
            state.activeExam.isRunning = true;
            state.activeExam.startTime = Date.now();
            state.activeExam.endsAt = state.activeExam.startTime + (state.activeExam.totalTimeSeconds * 1000);
            
            renderTimer(); // Re-render to update UI to active state
            
            // Clear existing interval if any
            if(state.timerInterval) clearInterval(state.timerInterval);
            
            state.timerInterval = setInterval(() => {
                const now = Date.now();
                const remainingMs = state.activeExam.endsAt - now;
                
                if (remainingMs <= 0) {
                    // Time is up
                    state.activeExam.timeLeftSeconds = 0;
                    concludeExam();
                } else {
                    // Update state
                    const oldSeconds = state.activeExam.timeLeftSeconds;
                    state.activeExam.timeLeftSeconds = Math.ceil(remainingMs / 1000);
                    
                    // Only update DOM if seconds changed to save performance
                    if(oldSeconds !== state.activeExam.timeLeftSeconds) {
                        updateTimerDOM();
                    }
                }
            }, 100); // 100ms interval for accuracy without heavy load
        }

        // Fast DOM update for timer (avoids full re-render)
        function updateTimerDOM() {
            const ex = state.activeExam;
            if(!ex || !ex.isRunning) return;

            const display = document.getElementById('countdown-display');
            const progressFill = document.getElementById('progress-bar-fill');
            const progressText = document.getElementById('progress-text');
            
            if(!display || !progressFill) return; // Not in view

            const isWarning = ex.timeLeftSeconds <= 300; // 5 mins
            const progress = ((ex.totalTimeSeconds - ex.timeLeftSeconds) / ex.totalTimeSeconds) * 100;

            display.textContent = formatTime(ex.timeLeftSeconds);
            progressFill.style.width = `${progress}%`;
            progressText.textContent = `${Math.floor(progress)}% Completed`;

            // Toggle Warning Classes
            if(isWarning) {
                display.classList.add('warning-pulse');
                progressFill.classList.add('warning-bg');
                progressFill.classList.remove('bg-gradient-to-r', 'from-imate-lightblue', 'to-imate-darkblue');
            } else {
                display.classList.remove('warning-pulse');
                progressFill.classList.remove('warning-bg');
                progressFill.classList.add('bg-gradient-to-r', 'from-imate-lightblue', 'to-imate-darkblue');
            }
        }

        // Add Extra Time Modal Logic
        function openAddTimeModal() {
            const modalHTML = `
                <div id="add-time-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
                        <h3 class="text-xl font-bold text-imate-darkblue mb-4">Add Extra Time</h3>
                        <p class="text-sm text-gray-500 mb-4">This will seamlessly recalculate the end time and progress bar without stopping the timer.</p>
                        
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Hours</label>
                                <input type="number" id="extra-hrs" min="0" value="0" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-imate-lightblue outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Minutes</label>
                                <input type="number" id="extra-mins" min="0" value="15" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-imate-lightblue outline-none">
                            </div>
                        </div>
                        
                        <div class="flex justify-end gap-3">
                            <button onclick="document.getElementById('add-time-modal').remove()" class="px-5 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-medium transition-colors">Cancel</button>
                            <button onclick="confirmAddTime()" class="px-5 py-2 bg-imate-lightblue hover:bg-opacity-90 text-white rounded-lg font-medium transition-colors">Confirm Add Time</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        function confirmAddTime() {
            const hrs = parseInt(document.getElementById('extra-hrs').value) || 0;
            const mins = parseInt(document.getElementById('extra-mins').value) || 0;
            const extraSeconds = (hrs * 3600) + (mins * 60);

            if(extraSeconds > 0 && state.activeExam) {
                // Update total time and extend endsAt
                state.activeExam.totalTimeSeconds += extraSeconds;
                state.activeExam.endsAt += (extraSeconds * 1000);
                
                // Refresh full timer UI to reflect new total and endsAt badge
                renderTimer();
            }
            document.getElementById('add-time-modal').remove();
        }

        // End Early
        function promptEndEarly() {
            if (confirm("Are you absolutely sure you want to end this exam early? This will jump to the conclusion screen immediately.")) {
                concludeExam();
            }
        }

        // Conclude
        function concludeExam() {
            if(state.timerInterval) {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }
            if(state.activeExam) {
                state.activeExam.isRunning = false;
                state.activeExam.actualEndTime = Date.now();
                state.activeExam.timeLeftSeconds = 0;
            }
            state.view = 'end';
            render();
        }

        // Back to Menu from Timer (Safety check)
        function handleBackToMenu() {
            if (state.activeExam && state.activeExam.isRunning) {
                if(!confirm("Warning: Exam is currently running! Leaving this screen will cancel the active timer. Are you sure?")) {
                    return;
                }
            }
            // Reset interval
            if(state.timerInterval) clearInterval(state.timerInterval);
            state.activeExam = null;
            state.view = 'home';
            render();
        }

        // Reset App State after conclusion
        function resetToDashboard() {
            state.activeExam = null;
            state.view = 'home';
            render();
        }

        // Global Clocks
        function updateGlobalClock() {
            const now = new Date();
            const timeStr = formatTimeAMPM(now);
            
            const mainClock = document.getElementById('global-clock');
            if (mainClock) mainClock.textContent = timeStr;
            
            const timerClock = document.getElementById('global-clock-timer');
            if (timerClock) timerClock.textContent = timeStr;
        }

        /** ==========================================
         * INITIALIZATION
         * ========================================== */
        function init() {
            state.globalClockInterval = setInterval(updateGlobalClock, 1000);
            render();
        }

        // Start App
        init();

    </script>
</body>
</html>
